# Tracked index scraping catalog. Add and review new scraping methods here.
indexes:
  - name: Betashares Australia 200 ETF
    exchange: ASX
    ticker: A200
    holdings:
      provider: betashares_csv
      url: https://www.betashares.com.au/files/csv/A200_Portfolio_Holdings.csv
      include_asset_classes:
        - Equity
        - Equities

  - name: iShares Core S&P/ASX 200 ETF
